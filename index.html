
<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loksewa Daily</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- MAIN QUIZ SCREEN -->

<div class="container" id="quizContainer">

    <!-- HEADER -->

   <div class="top">

    <div class="question-counter">

        <span id="current">1</span>/<span id="total">20</span>

    </div>

    <div class="timer">

        ⏱ <span id="timer">30</span>

    </div>

    <div class="score-box">

        Score:
        <span id="score">

            0

        </span>

    </div>

</div>

    <!-- PROGRESS -->

    <div class="progress">

        <div class="progressFill" id="progressFill"></div>

    </div>


    <!-- QUESTION -->

    <div class="question" id="question">

        Loading...

    </div>


    <!-- OPTIONS -->

    <div class="options" id="options">

    </div>



    <!-- FEEDBACK -->

    <div class="feedbackCard hidden" id="feedbackCard">

        <div id="answerStatus">

        </div>


        <div class="correctAnswerBox" id="correctAnswerBox">

        </div>


        <div class="explanationBox">

            <h3>

                Explanation

            </h3>

            <div id="fullExplanation">

            </div>

        </div>

    </div>



    <!-- BUTTONS -->

    <div class="bottom">

        <button id="prevBtn">

            ← Previous

        </button>

        <button id="nextBtn">

            Next →

        </button>

    </div>

</div>



<!-- RESULT SCREEN -->

<div class="resultScreen hidden" id="resultScreen">

    <div class="resultCard">

        <div class="emoji">

            🏆

        </div>

        <h1>

            Finished

        </h1>

        <h2 id="finalScore">

            0

        </h2>


        <div class="stats">

            <div class="stat">

                <div id="correctCount">

                    0

                </div>

                <p>

                    Correct

                </p>

            </div>


            <div class="stat">

                <div id="wrongCount">

                    0

                </div>

                <p>

                    Wrong

                </p>

            </div>


            <div class="stat">

                <div id="skippedCount">

                    0

                </div>

                <p>

                    Skipped

                </p>

            </div>

        </div>


        <div class="accuracy">

            Accuracy :

            <span id="accuracy">

                0%

            </span>

        </div>


        <div class="quote" id="quote">

            Consistency beats intensity.
            One page revised every day is stronger than ten hours once a week.

        </div>



        <button id="reviewBtn">

            Review Answers

        </button>


        <button id="reattemptWrongBtn">

            Reattempt Wrong Questions

        </button>


        <button id="restartBtn">

            Start Again

        </button>

    </div>

</div>



<!-- REVIEW SCREEN -->

<div class="reviewScreen hidden" id="reviewScreen">

    <div class="reviewHeader">

        <button id="backBtn">

            ← Back

        </button>


        <h2>

            Review

        </h2>


        <button id="reattemptAllBtn">

            Reattempt All

        </button>

    </div>


    <div id="reviewContainer">

    </div>

</div>


<script src="script.js"></script>

</body>
</html>
```
